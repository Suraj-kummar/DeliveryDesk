specVersion: "3.0"
metadata:
  name: sales-order-delivery-cockpit
type: application

framework:
  name: SAPUI5
  version: "1.120.12"
  libraries:
    - name: sap.ui.core
    - name: sap.m
    - name: sap.ui.comp
    - name: sap.suite.ui.generic.template
    - name: sap.ui.generic.app
    - name: sap.ushell
    - name: sap.f
    - name: themelib_sap_fiori_3

resources:
  configuration:
    paths:
      webapp: webapp

server:
  customMiddleware:
    # ── Proxy: forwards /sap/* calls to your S/4HANA backend ──────────────
    # Update "url" and "destination" with your system details before running.
    # "destination" is used in BAS/BTP; "url" is used in VS Code direct mode.
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false          # set true if using self-signed cert
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
          version: "1.120.12"
        backend:
          - path: /sap
            url: https://YOUR-S4-SYSTEM.yourcompany.com:443
            destination: YOUR_S4_DESTINATION
            client: "100"
            pathPrefix: ""

    # ── Live reload: refreshes browser on file save ────────────────────────
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300

builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    # ── Deploy to ABAP: uploads built app to your S/4HANA BSP repository ──
    # Run via: npm run deploy
    # Update url, client, app.name, app.package, app.transport before use.
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://YOUR-S4-SYSTEM.yourcompany.com:443
          client: "100"
          auth: basic
        app:
          name: ZSALESORDERCOCKPIT
          package: ZSALES_COCKPIT_PKG
          transport: DEVK900001
        excludes: []
